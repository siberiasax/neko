<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>おみくじ</title>
<style>
  body { text-align:center; font-family:sans-serif; margin-top:80px; }
  button { font-size:24px; padding:10px 30px; }
  #result { margin-top:30px; font-size:40px; font-weight:bold; }
  #daikichiImg { display:none; margin-top:20px; width:250px; }
</style>
</head>
<body>

<h1>おみくじ</h1>
<button onclick="drawOmikuji()">スタート</button>

<div id="result"></div>
<img id="daikichiImg" src="IMG_3539.JPG" alt="大吉画像">

<script>
function drawOmikuji() {
  const results = ["もも吉", "中吉", "小吉", "吉", "凶", "大凶"];
  const r = results[Math.floor(Math.random() * results.length)];
  document.getElementById("result").textContent = r;

  const img = document.getElementById("daikichiImg");
  if (r === "もも吉") {
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }
}
</script>

</body>
</html>
